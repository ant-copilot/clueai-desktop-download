name: Create Release

on:
  push:
    branches:
      - main
    paths:
      - 'releases/**'

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Get version from file name
        id: get_version
        run: |
          # Find the first non-.gitkeep file in the releases directory and extract a version number.
          file_path=$(find releases -type f -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" | head -n 1)
          if [ -n "$file_path" ]; then
            version=$(echo "$file_path" | grep -o -E '[0-9]+\.[0-9]+\.[0-9]+')
            if [ -z "$version" ]; then
              version="v$(date +%Y%m%d%H%M%S)"
            else
              version="v$version"
            fi
          else
            version="v$(date +%Y%m%d%H%M%S)"
          fi
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          release_name: Release ${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false

      - name: Upload Release Assets
        run: |
          # Upload all files from the releases directory as assets
          for file in $(find releases -type f -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm"); do
            if [ -f "$file" ]; then
              echo "Uploading $file"
              gh release upload ${{ steps.get_version.outputs.version }} "$file"
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
